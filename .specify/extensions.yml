settings:
  auto_execute_hooks: true

hooks:
  after_specify:
    - extension: quality-gate
      command: speckit.check-quality
      enabled: true
      optional: true
      prompt: "Run quality checklist validation on the new spec?"
      description: "Validates spec completeness and quality before planning"

  before_plan:
    - extension: prerequisites
      command: speckit.check-prerequisites
      enabled: true
      optional: false
      description: "Verifies spec.md exists and feature directory is valid"

  after_plan:
    - extension: review-gate
      command: speckit.review-plan
      enabled: true
      optional: true
      prompt: "Review the implementation plan before proceeding to tasks?"
      description: "Presents plan summary for human review before task generation"

  before_tasks:
    - extension: task-prerequisites
      command: speckit.check-task-prerequisites
      enabled: true
      optional: false
      description: "Verifies plan.md and spec.md exist, feature directory is valid, and all referenced contracts/data-models are present"

  after_tasks:
    - extension: task-review
      command: speckit.review-tasks
      enabled: true
      optional: true
      prompt: "Review the generated task list before proceeding to implementation?"
      description: "Presents tasks.md summary for human review before implementation"

  before_implement:
    - extension: git-branch
      command: speckit.git-branch
      enabled: true
      optional: false
      description: "Creates or switches to a git branch matching the feature directory name"

    - extension: readiness-gate
      command: speckit.readiness-gate
      enabled: true
      optional: false
      description: "Loads relevant agent skills and verifies all artifacts present"

  after_implement:
    - extension: acceptance-tests
      command: speckit.verify-acceptance
      enabled: true
      optional: false
      description: "Runs Playwright MCP against acceptance criteria in spec"
